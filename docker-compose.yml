version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url-shortener-app
    ports:
      # Host:container — app listens on 8080 inside the container (see application-docker.yml)
      - "8021:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      APP_BASE_URL: http://localhost:8021
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - url-shortener-net

  postgres:
    image: postgres:15-alpine
    container_name: url-shortener-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - url-shortener-net

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - url-shortener-net

volumes:
  postgres-data:
  redis-data:

networks:
  url-shortener-net:
    driver: bridge
